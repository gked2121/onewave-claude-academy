<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1220"/>
      <stop offset="100%" stop-color="#141E30"/>
    </linearGradient>

    <!-- Subtle edge stroke -->
    <linearGradient id="edge" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A3A5C"/>
      <stop offset="100%" stop-color="#1A2540"/>
    </linearGradient>

    <!-- Inner ambient glow -->
    <radialGradient id="ambientGlow" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#2563EB" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- C letter gradient (Claude terra cotta) -->
    <linearGradient id="cGrad" x1="80" y1="380" x2="300" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B85636"/>
      <stop offset="40%" stop-color="#DA7756"/>
      <stop offset="100%" stop-color="#E89A7E"/>
    </linearGradient>

    <!-- Upward chevron gradient (blue) -->
    <linearGradient id="chevGrad" x1="340" y1="340" x2="380" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <!-- Glow behind the C -->
    <filter id="cGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>

    <!-- Glow behind chevron -->
    <filter id="chevGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="url(#edge)" stroke-width="2"/>
  <rect width="512" height="512" rx="112" fill="url(#ambientGlow)"/>

  <!-- Glow layers -->
  <path d="M 300 140 A 130 130 0 1 0 300 370"
        stroke="#DA7756" stroke-width="44" stroke-linecap="round" fill="none"
        opacity="0.15" filter="url(#cGlow)"/>
  <path d="M 330 300 L 375 150 L 420 300"
        stroke="#2563EB" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="0.2" filter="url(#chevGlow)"/>

  <!-- C arc (main) -->
  <path d="M 300 140 A 130 130 0 1 0 300 370"
        stroke="url(#cGrad)"
        stroke-width="44"
        stroke-linecap="round"
        fill="none"/>

  <!-- Upward chevron (Academy "A" / growth arrow) -->
  <path d="M 330 300 L 375 150 L 420 300"
        stroke="url(#chevGrad)"
        stroke-width="30"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Small dot accent at top of chevron -->
  <circle cx="375" cy="138" r="8" fill="#60A5FA" opacity="0.7"/>
</svg>
