<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>

  <!-- Inner card with terminal-style appearance -->
  <rect x="48" y="48" width="416" height="416" rx="56" fill="url(#cardGradient)" stroke="url(#cardBorder)" stroke-width="2"/>

  <!-- Terminal header bar -->
  <rect x="48" y="48" width="416" height="56" rx="56" fill="url(#headerBg)"/>
  <rect x="48" y="80" width="416" height="24" fill="#0F172A"/>

  <!-- Traffic light dots -->
  <circle cx="92" cy="76" r="8" fill="#EF4444" opacity="0.9"/>
  <circle cx="120" cy="76" r="8" fill="#F59E0B" opacity="0.9"/>
  <circle cx="148" cy="76" r="8" fill="#10B981" opacity="0.9"/>

  <!-- Stylized "C" lettermark with gradient -->
  <path d="M310 196 C310 196, 292 164, 256 156 C220 148, 182 164, 164 196 C146 228, 146 284, 164 316 C182 348, 220 364, 256 356 C292 348, 310 316, 310 316"
        stroke="url(#claudeGradient)"
        stroke-width="32"
        stroke-linecap="round"
        fill="none"/>

  <!-- Terminal cursor blink -->
  <rect x="322" y="296" width="14" height="48" rx="7" fill="url(#cursorGradient)" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="1.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Prompt chevron -->
  <path d="M114 210 L148 248 L114 286"
        stroke="url(#promptGradient)"
        stroke-width="16"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        opacity="0.5"/>

  <!-- Subtle grid pattern overlay -->
  <line x1="176" y1="400" x2="336" y2="400" stroke="white" stroke-width="1.5" opacity="0.06"/>
  <line x1="176" y1="420" x2="296" y2="420" stroke="white" stroke-width="1.5" opacity="0.04"/>

  <defs>
    <!-- Background gradient - slate dark -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Card gradient -->
    <linearGradient id="cardGradient" x1="48" y1="48" x2="464" y2="464">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Card border -->
    <linearGradient id="cardBorder" x1="48" y1="48" x2="464" y2="464">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Header background -->
    <linearGradient id="headerBg" x1="48" y1="48" x2="464" y2="104">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>

    <!-- Claude brand gradient for the C -->
    <linearGradient id="claudeGradient" x1="150" y1="150" x2="340" y2="370">
      <stop offset="0%" stop-color="#DA7756"/>
      <stop offset="50%" stop-color="#E8957A"/>
      <stop offset="100%" stop-color="#DA7756"/>
    </linearGradient>

    <!-- Cursor gradient -->
    <linearGradient id="cursorGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>

    <!-- Prompt chevron gradient -->
    <linearGradient id="promptGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
</svg>