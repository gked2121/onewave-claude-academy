<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0F1C"/>
      <stop offset="50%" stop-color="#0E1525"/>
      <stop offset="100%" stop-color="#111927"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>

    <!-- Background orbs -->
    <radialGradient id="orbClaude" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DA7756" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#DA7756" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo gradients -->
    <linearGradient id="logoCGrad" x1="60" y1="200" x2="160" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B85636"/>
      <stop offset="40%" stop-color="#DA7756"/>
      <stop offset="100%" stop-color="#E89A7E"/>
    </linearGradient>
    <linearGradient id="logoChevGrad" x1="180" y1="180" x2="200" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <!-- Logo background -->
    <linearGradient id="logoBg" x1="50" y1="50" x2="250" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1220"/>
      <stop offset="100%" stop-color="#141E30"/>
    </linearGradient>
    <linearGradient id="logoEdge" x1="50" y1="50" x2="250" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A3A5C"/>
      <stop offset="100%" stop-color="#1A2540"/>
    </linearGradient>

    <!-- Text accent gradient -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#DA7756"/>
      <stop offset="100%" stop-color="#E89A7E"/>
    </linearGradient>

    <!-- Divider line gradient -->
    <linearGradient id="dividerGrad" x1="480" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#DA7756" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Background orbs -->
  <circle cx="180" cy="315" r="280" fill="url(#orbClaude)"/>
  <circle cx="900" cy="200" r="350" fill="url(#orbBlue)"/>
  <circle cx="1050" cy="500" r="250" fill="url(#orbTeal)"/>

  <!-- Logo mark (large, left side) -->
  <g transform="translate(100, 165)">
    <!-- Logo background -->
    <rect width="300" height="300" rx="66" fill="url(#logoBg)"/>
    <rect x="1" y="1" width="298" height="298" rx="65" fill="none" stroke="url(#logoEdge)" stroke-width="2"/>

    <!-- Ambient glow inside logo -->
    <rect width="300" height="300" rx="66" fill="url(#orbClaude)" opacity="0.5"/>

    <!-- C glow -->
    <path d="M 175 82 A 76 76 0 1 0 175 218"
          stroke="#DA7756" stroke-width="26" stroke-linecap="round" fill="none"
          opacity="0.2" filter="url(#softGlow)"/>

    <!-- C arc -->
    <path d="M 175 82 A 76 76 0 1 0 175 218"
          stroke="url(#logoCGrad)"
          stroke-width="26"
          stroke-linecap="round"
          fill="none"/>

    <!-- Chevron glow -->
    <path d="M 193 176 L 218 88 L 243 176"
          stroke="#2563EB" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"
          fill="none" opacity="0.25" filter="url(#softGlow)"/>

    <!-- Upward chevron -->
    <path d="M 193 176 L 218 88 L 243 176"
          stroke="url(#logoChevGrad)"
          stroke-width="18"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"/>

    <!-- Dot accent -->
    <circle cx="218" cy="80" r="5" fill="#60A5FA" opacity="0.7"/>
  </g>

  <!-- Main text content -->
  <!-- "Claude Academy" -->
  <text x="480" y="260" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">Claude Academy</text>

  <!-- "by OneWave AI" -->
  <text x="482" y="310" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="url(#accentGrad)" letter-spacing="0.5">by OneWave AI</text>

  <!-- Divider line -->
  <line x1="480" y1="340" x2="1050" y2="340" stroke="url(#dividerGrad)" stroke-width="2"/>

  <!-- Tagline -->
  <text x="480" y="385" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.7)">Upskill your team on the Anthropic ecosystem.</text>
  <text x="480" y="420" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.7)">Claude Chat, Claude Code, MCP, and more.</text>

  <!-- Feature pills -->
  <g transform="translate(480, 455)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="160" height="40" rx="20" fill="rgba(37,99,235,0.12)" stroke="rgba(37,99,235,0.25)" stroke-width="1.5"/>
    <text x="80" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#60A5FA" text-anchor="middle">Team Analytics</text>

    <!-- Pill 2 -->
    <rect x="175" y="0" width="160" height="40" rx="20" fill="rgba(218,119,86,0.12)" stroke="rgba(218,119,86,0.25)" stroke-width="1.5"/>
    <text x="255" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#DA7756" text-anchor="middle">Certifications</text>

    <!-- Pill 3 -->
    <rect x="350" y="0" width="180" height="40" rx="20" fill="rgba(8,145,178,0.12)" stroke="rgba(8,145,178,0.25)" stroke-width="1.5"/>
    <text x="440" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#22D3EE" text-anchor="middle">Gamified Learning</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="595" width="1200" height="35" fill="rgba(0,0,0,0.3)"/>
  <text x="1160" y="618" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="rgba(255,255,255,0.35)" text-anchor="end">claude-academy.onewave.ai</text>
</svg>
