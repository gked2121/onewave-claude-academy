<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient - deep navy -->
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#0E1525"/>
      <stop offset="100%" stop-color="#1A2540"/>
    </linearGradient>

    <!-- Subtle edge gradient -->
    <linearGradient id="edge" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#2A3A5C"/>
      <stop offset="50%" stop-color="#1E2D4A"/>
      <stop offset="100%" stop-color="#151E33"/>
    </linearGradient>

    <!-- Ambient glow -->
    <radialGradient id="glow" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="rgba(218,119,86,0.1)"/>
      <stop offset="60%" stop-color="rgba(37,99,235,0.04)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <!-- Glass highlight - top-left -->
    <linearGradient id="glass" x1="60" y1="60" x2="320" y2="320">
      <stop offset="0%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

    <!-- C arc gradient - Claude terra cotta -->
    <linearGradient id="cGrad" x1="96" y1="362" x2="301" y2="150">
      <stop offset="0%" stop-color="#B85636"/>
      <stop offset="35%" stop-color="#DA7756"/>
      <stop offset="100%" stop-color="#E8957A"/>
    </linearGradient>

    <!-- Chevron gradient - OneWave blue -->
    <linearGradient id="chevGrad" x1="350" y1="300" x2="370" y2="155">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>

    <!-- Subtle shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.3)"/>
    </filter>

    <!-- Mark glow -->
    <filter id="markGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Edge border -->
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="url(#edge)" stroke-width="1.5"/>

  <!-- Ambient glow layer -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Glass highlight layer -->
  <rect width="512" height="512" rx="112" fill="url(#glass)"/>

  <!-- Glow under the mark -->
  <g opacity="0.35" filter="url(#markGlow)">
    <path d="M 301 150 A 130 130 0 1 0 301 362"
          stroke="#DA7756"
          stroke-width="44"
          stroke-linecap="round"
          fill="none"/>
  </g>

  <!-- C arc - Claude terra cotta -->
  <path d="M 301 150 A 130 130 0 1 0 301 362"
        stroke="url(#cGrad)"
        stroke-width="44"
        stroke-linecap="round"
        fill="none"
        filter="url(#shadow)"/>

  <!-- Upward chevron - OneWave blue -->
  <path d="M 326 298 L 371 168 L 416 298"
        stroke="url(#chevGrad)"
        stroke-width="32"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#shadow)"/>
</svg>
