<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120">
      <stop offset="0%" stop-color="#0E1525"/>
      <stop offset="100%" stop-color="#1A2540"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="120" y2="120">
      <stop offset="0%" stop-color="#2A3A5C"/>
      <stop offset="100%" stop-color="#151E33"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="rgba(218,119,86,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="cGrad" x1="22" y1="85" x2="70" y2="35">
      <stop offset="0%" stop-color="#B85636"/>
      <stop offset="35%" stop-color="#DA7756"/>
      <stop offset="100%" stop-color="#E8957A"/>
    </linearGradient>
    <linearGradient id="chevGrad" x1="80" y1="70" x2="87" y2="36">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="119" height="119" rx="25.5" fill="none" stroke="url(#edge)" stroke-width="1"/>
  <rect width="120" height="120" rx="26" fill="url(#glow)"/>

  <!-- C arc -->
  <path d="M 70 35 A 30 30 0 1 0 70 85"
        stroke="url(#cGrad)"
        stroke-width="10"
        stroke-linecap="round"
        fill="none"/>

  <!-- Upward chevron -->
  <path d="M 76 69 L 87 39 L 98 69"
        stroke="url(#chevGrad)"
        stroke-width="7"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>
</svg>
